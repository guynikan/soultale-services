[build]
builder = "nixpacks"
buildCommand = "npm install && npm run build && npx prisma generate"

[build.nixpacksPlan.variables]
NODE_VERSION = "20"

[deploy]
startCommand = "until npx prisma migrate deploy; do echo 'DB not ready, retrying in 3s...'; sleep 3; done && npm run start:prod"
restartPolicyType = "ON_FAILURE"
